# feature_request.yml
#
# Leviftas project feature request Issue template.
#
# - Author   : FrostLeo <frostleo.dev@gmail.com>
# - Created  : 2025/10/10
# - Modified : 2025/10/10

name: Feature Request
description: Suggest a new feature or enhancement for Leviftas
title: "[Feature]: "
labels: ["enhancement", "triage"]
assignees:
  - FrostLeo
body:
  - type: markdown
    attributes:
      value: |
        Thank you for your interest in improving Leviftas! 
        
        Please take a moment to fill out this feature request form.

  - type: input
    id: contact
    attributes:
      label: Contact Details
      description: How can we reach you for further discussion?
      placeholder: ex. email@example.com or Discord username
    validations:
      required: false

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: |
        Is your feature request related to a problem? Please describe.
        A clear and concise description of what the problem is.
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: |
        Describe the solution you'd like.
        A clear and concise description of what you want to happen.
      placeholder: I would like to see...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternative Solutions
      description: |
        Describe alternatives you've considered.
        A clear and concise description of any alternative solutions or features you've considered.
      placeholder: Other approaches could include...
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature to you?
      options:
        - Critical (Blocking my work)
        - High (Would significantly improve my workflow)
        - Medium (Nice to have)
        - Low (Minor improvement)
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      description: Which area of Leviftas does this feature relate to?
      multiple: true
      options:
        - Core Engine
        - API
        - CLI
        - Documentation
        - Performance
        - Security
        - User Interface
        - Integration
        - Other
    validations:
      required: true

  - type: textarea
    id: use-cases
    attributes:
      label: Use Cases
      description: |
        Please provide specific use cases for this feature.
        This helps us understand the real-world applications.
      placeholder: |
        1. As a developer, I want to...
        2. When working with large datasets...
    validations:
      required: false

  - type: textarea
    id: implementation
    attributes:
      label: Implementation Suggestions
      description: |
        If you have ideas about how this could be implemented, please share them.
        This could include code snippets, architecture diagrams, or technical approaches.
      render: markdown
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: |
        Add any other context, screenshots, or examples about the feature request here.
        You can drag and drop images into this field.
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      description: Please confirm the following
      options:
        - label: I have searched existing issues and this feature hasn't been requested
          required: true
        - label: I have read the project roadmap and this doesn't conflict with planned features
          required: false
        - label: I am willing to help implement this feature
          required: false