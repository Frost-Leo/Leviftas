# bug_report.yml
#
# Leviftas project bug submission Issue template.
#
# - Author   : FrostLeo <frostleo.dev@gmail.com>
# - Created  : 2025/10/10
# - Modified : 2025/10/10

name: Bug Report
description: Propose a bug you found in the project to help us improve it better.
title: "[Bug]: "
labels: ["bug", "triage"]
assignees:
  - Frost-Leo
body:
  - type: markdown
    attributes:
      value: |
        Thank you for your interest in Leviftas, and thank you for taking the time to fill out this bug report!
        
        Before submitting, please ensure you have searched for existing issues to avoid duplicates.

  - type: input
    id: contact
    attributes:
      label: Contact Details
      description: How can we get in touch with you if we need more info?
      placeholder: ex. email@example.com or Discord username
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Please clearly and concisely describe this bug.
      placeholder: Please tell us what happened...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: Tell us what should have happened...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Please tell us how to reproduce this bug.
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: What operating system are you using?
      options:
        - Windows 11
        - Windows 10
        - macOS Sonoma (14.x)
        - macOS Ventura (13.x)
        - macOS Monterey (12.x)
        - Ubuntu 22.04
        - Ubuntu 20.04
        - Debian
        - Fedora
        - Arch Linux
        - Other Linux Distribution
        - Other (please specify in additional context)
    validations:
      required: true

  - type: dropdown
    id: arch
    attributes:
      label: System Architecture
      description: What is your system architecture?
      options:
        - x64 (AMD64)
        - x86 (32-bit)
        - ARM64
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Leviftas Version
      description: What version of Leviftas are you running?
      placeholder: ex. v1.0.0 or commit hash
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Bug Severity
      description: How severe is this bug?
      options:
        - Critical (System crash/Data loss)
        - High (Major feature broken)
        - Medium (Minor feature broken)
        - Low (Cosmetic issue)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: |
        Please copy and paste any relevant log output. 
        This will be automatically formatted into code, so no need for backticks.
      render: shell
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: |
        If applicable, add screenshots to help explain your problem.
        Tip: You can attach images by clicking this area to highlight it and then dragging files in.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: |
        Add any other context about the problem here.
        - Configuration files
        - Environment variables
        - Related issues
        - Workarounds you've tried
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      description: Please confirm the following
      options:
        - label: I have searched the existing issues and this is not a duplicate
          required: true
        - label: I have read the documentation
          required: false
        - label: I am using the latest version of Leviftas
          required: false
        - label: I have provided all the information requested
          required: true